# Engineering caption demo config inspired by arXiv:2505.01050v1.
# This file is not the strict paper benchmark: it uses the local Caltech demo
# manifest and a square 299 attack canvas for convenience.
experiment_name: "paper-full"

paths:
  manifest: "data/caltech_large/manifest.json"
  output_dir: "outputs/paper_caltech"
  model_cache_dir: "models"

runtime:
  device: "cuda"
  seed: 42
  attack_limit: 50
  sequential_surrogates: false  # Keep all surrogates on the A6000 to avoid per-step model transfers.
  enable_tf32: true
  cudnn_benchmark: true

attack:
  # Engineering convenience setting. The strict paper caption benchmark keeps
  # the original 229 x 299 image size instead.
  image_size: 299
  epsilon: 0.0627
  step_size: 0.004
  steps: 300
  augmentation_batches: 4
  augmentation_forward_batch_size: 4
  metrics_interval: 10
  temperature: 0.1
  top_k: 10
  patch_drop_rate: 0.20
  drop_path_max_rate: 0.15
  perturbation_ema_decay: 0.99
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true
  enable_gaussian: true
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  enable_crop: true
  crop_prob: 0.5
  enable_pad: true
  pad_prob: 0.5
  enable_jpeg: true
  jpeg_prob: 0.2
  jpeg_backend: "tensor"

# 8 CLIP models - paper Table 3 with SigLIP + ViT-H + ConvNeXt
# Paper Section 3.2: 4x ViT-H + 3x ViT-SigLIP + 1x ConvNeXt XXL
surrogates:
  # ViT-H variants (4 from paper)
  - model_name: "ViT-H-14"
    pretrained: "laion2b_s32b_b79k"
    input_size: 224
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "metaclip_fullcc"
    input_size: 224
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "metaclip_altogether"
    input_size: 224
    enabled: true
  - model_name: "ViT-H-14-378"
    pretrained: "dfn5b"
    input_size: 378
    enabled: true
  # ViT-SigLIP variants (3 from paper)
  - model_name: "ViT-B-16-SigLIP"
    pretrained: "webli"
    input_size: 224
    enabled: true
  - model_name: "ViT-B-16-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  - model_name: "ViT-L-16-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  # ConvNeXt XXL (1 from paper)
  - model_name: "convnext_xxlarge"
    pretrained: "laion2b_s34b_b82k_augreg"
    input_size: 224
    enabled: true

evaluation:
  ollama_victim:
    enabled: false
