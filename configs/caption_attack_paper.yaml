# Paper-aligned config: arXiv:2505.01050v1
# 8 CLIP models as per paper Table 3 (achieves 94.4% on GPT-4o)
# Surrogate models aligned with paper Section 3.2
experiment_name: "paper-full"

paths:
  manifest: "data/caltech_large/manifest.json"
  output_dir: "outputs/paper_caltech"
  model_cache_dir: "models"

runtime:
  device: "cuda"
  seed: 42
  attack_limit: 50
  sequential_surrogates: true  # Set to false on A6000
  enable_tf32: true
  cudnn_benchmark: true

attack:
  # Paper: epsilon=16/255 ≈ 0.0627
  epsilon: 0.0627
  step_size: 0.004
  steps: 300
  augmentation_batches: 4
  temperature: 0.1
  top_k: 10
  patch_drop_rate: 0.20
  drop_path_max_rate: 0.15
  perturbation_ema_decay: 0.99
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true
  enable_gaussian: true
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  enable_crop: true
  crop_prob: 0.5
  enable_pad: true
  pad_prob: 0.5
  enable_jpeg: true
  jpeg_prob: 0.2

# 8 CLIP models - paper Table 3 & Section 3.2
# Note: Add ConvNeXt and SigLIP models if available
surrogates:
  # ViT-B variants (from paper)
  - model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"
    input_size: 224
    enabled: true
  - model_name: "ViT-B-16"
    pretrained: "laion2b_s34b_b88k"
    input_size: 224
    enabled: true
  # ViT-L variants
  - model_name: "ViT-L-14"
    pretrained: "openai"
    input_size: 224
    enabled: true
  - model_name: "ViT-L-14-336"
    pretrained: "openai"
    input_size: 336
    enabled: true
  # ViT-H variants (from paper)
  - model_name: "ViT-H-14"
    pretrained: "laion2b_s32b_b79k"
    input_size: 224
    enabled: true
  - model_name: "ViT-bigG-14"
    pretrained: "laion2b_s39b_b160k"
    input_size: 224
    enabled: true
  # ResNet variants
  - model_name: "RN50"
    pretrained: "openai"
    input_size: 224
    enabled: true
  - model_name: "RN101"
    pretrained: "openai"
    input_size: 224
    enabled: true

# Optional additional models for A6000:
# - ConvNeXt-XXL (paper mentions)
# - ViT-SigLIP variants (paper mentions)
# Add these if GPU memory allows

evaluation:
  ollama_victim:
    enabled: false