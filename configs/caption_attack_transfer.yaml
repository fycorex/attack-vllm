# Transfer-optimized config: lower epsilon, more augmentation
experiment_name: "transfer-ollama"

paths:
  manifest: "data/cifar10_caption_attack_demo/manifest.json"
  output_dir: "outputs/transfer_ollama"
  model_cache_dir: "models"

runtime:
  device: "cuda"
  seed: 42
  attack_limit: 4
  sequential_surrogates: true
  enable_tf32: true
  cudnn_benchmark: true

attack:
  epsilon: 8.0  # Lower epsilon for better image quality
  step_size: 0.5
  steps: 300
  augmentation_batches: 8  # More augmentation for transfer
  temperature: 0.1
  top_k: 4
  patch_drop_rate: 0.30
  drop_path_max_rate: 0.15
  perturbation_ema_decay: 0.99
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true

surrogates:
  - model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"
    input_size: 224
    enabled: true
  - model_name: "ViT-B-16"
    pretrained: "laion2b_s34b_b88k"
    input_size: 224
    enabled: true
  - model_name: "RN50"
    pretrained: "openai"
    input_size: 224
    enabled: true

evaluation:
  ollama_victim:
    enabled: false
