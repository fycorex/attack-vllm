experiment_name: caption-attack-phase2-gpt5-caption
paths:
  manifest: data/cifar10_caption_attack_car2truck_alt100_demo/manifest.json
  output_dir: outputs/caption_attack_phase2_gpt5_caption
  model_cache_dir: models
runtime:
  device: cuda
  seed: 123
  attack_limit: 4
  sequential_surrogates: true
attack:
  epsilon: 0.06274509803921569
  step_size: 0.00392156862745098
  steps: 120
  augmentation_batches: 4
  temperature: 0.1
  top_k: 4
  relative_proxy_weight: 0.0
  patch_drop_rate: 0.2
  drop_path_max_rate: 0.1
  perturbation_ema_decay: 0.99
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  crop_prob: 0.5
  crop_scale_min: 0.8
  crop_scale_max: 1.0
  crop_ratio_min: 0.75
  crop_ratio_max: 1.3333333333
  pad_prob: 0.5
  jpeg_prob: 0.5
  jpeg_quality_min: 0.5
  jpeg_quality_max: 1.0
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true
  enable_gaussian: true
  enable_crop: true
  enable_pad: true
  enable_jpeg: true
evaluation:
  success_margin_threshold: 0.0
  caption_victim:
    enabled: false
  vqa_victim:
    enabled: false
  gpt_victim:
    enabled: true
    model_name: openai/gpt-5
    api_mode: chat_completions
    base_url: https://models.github.ai/inference
    task_type: caption
    prompt_mode: freeform
    success_mode: judge
    caption_prompt: "Provide a concise description of the image using no more than three sentences."
    max_output_tokens: 256
    temperature: 0.0
    reasoning_effort: minimal
    api_key_env: OPENAI_API_KEY
    max_retries: 6
    retry_backoff_seconds: 20.0
    request_pause_seconds: 15.0
    judge_model_name: openai/gpt-4o
    judge_api_mode: chat_completions
    judge_max_output_tokens: 128
    judge_temperature: 0.0
    judge_api_key_env: OPENAI_API_KEY
    judge_base_url: https://models.github.ai/inference
surrogates:
  - model_name: ViT-B-32
    pretrained: laion2b_s34b_b79k
    input_size: 224
    enabled: true
  - model_name: ViT-B-16
    pretrained: laion2b_s34b_b88k
    input_size: 224
    enabled: true
  - model_name: RN50
    pretrained: openai
    input_size: 224
    enabled: true
  - model_name: RN101
    pretrained: openai
    input_size: 224
    enabled: true
  - model_name: ViT-L-14
    pretrained: openai
    input_size: 224
    enabled: true
