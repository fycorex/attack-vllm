# Strict image-captioning reproduction target for arXiv:2505.01050v1.
#
# This config intentionally points at the paper dataset manifest that still
# needs to be prepared:
#   data/nips2017_caption_attack/manifest.json
#
# Expected manifest contents:
# - 1,000 NIPS 2017 Adversarial Learning Challenges dev images.
# - ImageNet-1K ground-truth and target attack labels per item.
# - 50 ImageNet-1K validation positive examples for each target label.
# - 50 ImageNet-1K validation negative examples for each ground-truth label.
experiment_name: "paper-strict-captioning"

paths:
  manifest: "data/nips2017_caption_attack/manifest.json"
  output_dir: "outputs/paper_strict_captioning"
  model_cache_dir: "models"

runtime:
  device: "cuda"
  seed: 42
  attack_limit: 1000
  attack_offset: 0
  sequential_surrogates: false
  enable_tf32: true
  cudnn_benchmark: true

attack:
  # The paper's default protocol keeps the attack image at the original caption
  # benchmark resolution. For NIPS 2017 dev images in this benchmark, that is
  # 229 x 299. The square 299 setting appears only in the input-size ablation.
  image_size: [229, 299]
  epsilon: 0.0627
  step_size: 0.004
  steps: 300
  augmentation_batches: 4
  # Set both knobs to 1 for the most conservative execution order. Increase
  # these only for faster engineering runs after validating equivalence.
  augmentation_forward_batch_size: 1
  metrics_interval: 1
  temperature: 0.1
  top_k: 10
  relative_proxy_weight: 0.0
  patch_drop_rate: 0.20
  drop_path_max_rate: 0.15
  perturbation_ema_decay: 0.99
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  crop_prob: 0.5
  crop_scale_min: 0.80
  crop_scale_max: 1.00
  crop_ratio_min: 0.75
  crop_ratio_max: 1.3333333333
  pad_prob: 0.5
  jpeg_prob: 0.5
  jpeg_quality_min: 0.5
  jpeg_quality_max: 1.0
  jpeg_backend: "pil"
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true
  enable_gaussian: true
  enable_crop: true
  enable_pad: true
  enable_jpeg: true

# OpenCLIP-available mapping for the paper's 8-CLIP captioning surrogate idea.
# The exact appendix model IDs should still be audited against available
# checkpoints before reporting paper-equivalent ASR.
surrogates:
  - model_name: "ViT-H-14-378"
    pretrained: "dfn5b"
    input_size: 378
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "dfn5b"
    input_size: 224
    enabled: true
  - model_name: "ViT-SO400M-14-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  - model_name: "ViT-SO400M-14-SigLIP"
    pretrained: "webli"
    input_size: 224
    enabled: true
  - model_name: "ViT-L-16-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  - model_name: "ViT-bigG-14"
    pretrained: "laion2b_s39b_b160k"
    input_size: 224
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "metaclip_fullcc"
    input_size: 224
    enabled: true
  - model_name: "convnext_xxlarge"
    pretrained: "laion2b_s34b_b82k_augreg"
    input_size: 256
    enabled: true

evaluation:
  gpt_victim:
    enabled: true
    model_name: "gpt-4o"
    task_type: "caption"
    api_mode: "auto"
    prompt_mode: "freeform"
    success_mode: "judge"
    caption_prompt: "Provide a concise description of the image using no more than three sentences."
    require_source_absent: false
    max_output_tokens: 64
    temperature: 0.0
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    request_timeout_seconds: 90
    max_retries: 4
    retry_backoff_seconds: 10.0
    judge_model_name: "gpt-4o"
    judge_api_mode: "auto"
    judge_max_output_tokens: 128
    judge_temperature: 0.0
    judge_api_key_env: "OPENAI_API_KEY"
    judge_base_url: "https://api.openai.com/v1"
