# Strict text-recognition reproduction target for arXiv:2505.01050v1 Section 5.3.
#
# Expected manifest protocol:
# - Omni-OCR benchmark
# - 200 filtered test cases
# - Each case is one text-related question with a targeted incorrect answer
# - Keep only cases where both GPT-4o and Claude 3.5 answer the clean image correctly
# - Use PaddleOCR-style text region localization and crop-based positive/negative examples
experiment_name: "paper-strict-omni-ocr-eps16"

paths:
  manifest: "data/omni_ocr_text_paper/manifest.json"
  output_dir: "outputs/paper_omni_ocr_eps16"
  model_cache_dir: "models"

runtime:
  device: "cuda"
  seed: 42
  attack_limit: 200
  attack_offset: 0
  sequential_surrogates: false
  enable_tf32: true
  cudnn_benchmark: true

attack:
  # Unless otherwise stated, the paper keeps the original image size.
  image_size: "original"
  epsilon: 0.06274509803921569
  step_size: 0.004
  steps: 300
  augmentation_batches: 4
  augmentation_forward_batch_size: 1
  metrics_interval: 1
  temperature: 0.1
  top_k: 10
  relative_proxy_weight: 0.0
  patch_drop_rate: 0.20
  drop_path_max_rate: 0.15
  perturbation_ema_decay: 0.99
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  crop_prob: 0.5
  crop_scale_min: 0.80
  crop_scale_max: 1.00
  crop_ratio_min: 0.75
  crop_ratio_max: 1.3333333333
  pad_prob: 0.5
  jpeg_prob: 0.5
  jpeg_quality_min: 0.5
  jpeg_quality_max: 1.0
  jpeg_backend: "pil"
  enable_patch_drop: true
  enable_drop_path: true
  enable_perturbation_ema: true
  enable_gaussian: true
  enable_crop: true
  enable_pad: true
  enable_jpeg: true

surrogates:
  - model_name: "ViT-H-14-378"
    pretrained: "dfn5b"
    input_size: 378
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "dfn5b"
    input_size: 224
    enabled: true
  - model_name: "ViT-SO400M-14-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  - model_name: "ViT-SO400M-14-SigLIP"
    pretrained: "webli"
    input_size: 224
    enabled: true
  - model_name: "ViT-L-16-SigLIP-384"
    pretrained: "webli"
    input_size: 384
    enabled: true
  - model_name: "ViT-bigG-14"
    pretrained: "laion2b_s39b_b160k"
    input_size: 224
    enabled: true
  - model_name: "ViT-H-14"
    pretrained: "metaclip_fullcc"
    input_size: 224
    enabled: true
  - model_name: "convnext_xxlarge"
    pretrained: "laion2b_s34b_b82k_augreg"
    input_size: 256
    enabled: true

evaluation:
  success_margin_threshold: 0.0
  gpt_victim:
    enabled: false
